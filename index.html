<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h1>Expense &amp; Budget Visualizer</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>

    <!-- Balance Display -->
    <div class="balance-section">
      <span class="balance-label">Total Balance:</span>
      <span id="balance" class="balance-amount">$0.00</span>
    </div>

    <!-- Add Transaction Form -->
    <form id="transaction-form" novalidate>
      <div class="form-header">
        <h2>Add Transaction</h2>
        <button type="button" id="new-category-btn" class="btn-secondary">+ New Category</button>
      </div>
      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" name="itemName" placeholder="e.g. Lunch" />
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" placeholder="e.g. 12.50" step="0.01" min="0" />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">-- Select category --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
      </div>
      <button type="submit">Add Transaction</button>
      <p class="error" id="form-error"></p>
    </form>

    <!-- Transaction List -->
    <div class="list-section">
      <div class="list-header">
        <h2>Transactions</h2>
        <div class="sort-controls">
          <label for="sort-select">Sort by:</label>
          <select id="sort-select">
            <option value="amount-desc">Amount (high–low)</option>
            <option value="amount-asc">Amount (low–high)</option>
            <option value="category">Category</option>
          </select>
        </div>
      </div>
      <div id="transaction-list" class="transaction-list">
        <p class="empty-state">No transactions yet.</p>
      </div>
    </div>

    <!-- Spending Distribution Chart -->
    <div class="chart-section">
      <h2>Spending by Category</h2>
      <p id="chart-empty" class="empty-state">Add transactions to see the chart.</p>
      <canvas id="spending-chart" style="display:none;"></canvas>
    </div>
  </div>

  <!-- New Category Modal -->
  <div id="category-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <h2 id="modal-title">New Category</h2>
      <div class="form-group">
        <label for="new-category-name">Category Name</label>
        <input type="text" id="new-category-name" placeholder="e.g. Health" maxlength="30" />
      </div>
      <p class="error" id="modal-error"></p>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn-secondary">Cancel</button>
        <button type="button" id="modal-confirm">Add Category</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
